<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMP Phase 4 Examination</title>
<style>
  body {
    font-family: "Segoe UI", sans-serif;
    background-color: #2c2f33;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  #app {
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 600px;
    height: 80vh;
    background-color: #36393f;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
  }
  #container {
    flex: 1;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
    background-color: #2f3136;
  }
  .bubble {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 16px;
    word-wrap: break-word;
  }
  .question {
    background-color: #7289da;
    color: white;
    align-self: flex-start;
  }
  .answer {
    background-color: #4f545c;
    color: white;
    align-self: flex-end;
  }
  #input-area {
    display: flex;
    padding: 10px;
    background-color: #202225;
    gap: 8px;
  }
  textarea {
    flex: 1;
    padding: 10px;
    border-radius: 12px;
    border: none;
    resize: none;
    font-size: 14px;
    background-color: #40444b;
    color: white;
  }
  button {
    background-color: #7289da;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 10px 20px;
    cursor: pointer;
  }
  button:hover {
    background-color: #5b6eae;
  }
</style>
</head>
<body>

<div id="app">
  <div id="container"></div>
  <div id="input-area">
    <textarea id="answer" placeholder="Type your answer here" rows="2"></textarea>
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
const questions = [
  "Enter your Roblox username:",
  "Enter your Discord username:",
  "Enter your Discord ID:",
  "Why do you want to join?"
];

let current = 0;
const container = document.getElementById('container');
const answerEl = document.getElementById('answer');
const sendBtn = document.getElementById('sendBtn');

function showBubble(text, type='question') {
  const div = document.createElement('div');
  div.className = 'bubble ' + type;
  div.innerText = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function loadQuestion() {
  if(current >= questions.length) {
    showBubble("Application Submitted! Thank you.", "question");
    document.getElementById('input-area').style.display = 'none';
    return;
  }
  showBubble(questions[current], 'question');
  answerEl.value = '';
}

function nextQuestion() {
  const ans = answerEl.value.trim() || "No answer provided";
  showBubble(ans, 'answer');
  current++;
  loadQuestion();
}

sendBtn.addEventListener('click', nextQuestion);
answerEl.addEventListener('keydown', (e) => {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    nextQuestion();
  }
});

// Start
loadQuestion();
</script>

</body>
</html>
